name: Deploy News Portal to Google Cloud

on:
  push:
    branches:
      - main  # یا جو بھی آپ کی مین برانچ کا نام ہے

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Deploy to Cloud Storage (Static Website)
      run: |
        # یہ کمانڈ آپ کی فائلیں گوگل کلاؤڈ بکٹ میں کاپی کر دے گی
        gsutil -m cp -r ./* gs://YOUR_BUCKET_NAME
