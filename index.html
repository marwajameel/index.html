
<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDN News - پائپ لائن رپورٹ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid #d32f2f; }
        h2 { color: #d32f2f; margin-bottom: 5px; font-size: 28px; }
        #status-box { margin: 20px 0; padding: 15px; border-radius: 8px; background: #fff3f3; border: 1px solid #ffcdd2; font-weight: bold; font-size: 18px; }
        .table-container { overflow-x: auto; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; display: none; min-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #d32f2f; color: white; }
        .news-card-footer { margin-top: 40px; padding: 20px; border-top: 2px solid #eee; text-align: right; background: #f9f9f9; border-radius: 10px; }
        .highlight { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 SDN News - لائیو پائپ لائن رپورٹ</h2>
    
    <div id="status-box">کنکشن قائم کیا جا رہا ہے...</div>

    <div class="table-container">
        <table id="results-table">
            <thead><tr id="table-header"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="news-card-footer">
        <p><span class="highlight">SDN News:</span> باخبر، ہر لمحہ</p>
        <p><span class="highlight">Online:</span> www.SDNNews.com</p>
        <p><span class="highlight">Connect:</span> @SDNNews</p>
        <p><span class="highlight">Contact:</span> +92 346 0008235</p>
        <p><span class="highlight">رپورٹ:</span> جمیل احمد کلیال</p>
    </div>
</div>

<script>
// آپ کی فراہم کردہ معلومات
const API_KEY = '5rt2GYQdC7Two5P80scW5CSN447zRCl2';

async function startPolling() {
    const statusBox = document.getElementById('status-box');
    const options = { headers: { 'X-DUNE-API-KEY': API_KEY } };

    try {
        // ایگزیکیوشن اسٹیٹس حاصل کریں
        const response = await fetch(`https://api.dune.com/api/v1/execution/${EXECUTION_ID}/status`, options);
        const data = await response.json();

        statusBox.innerText = `موجودہ حالت: ${data.state}`;

        // اگر اسٹیٹس COMPLETED ہے
        if (data.state === 'QUERY_STATE_COMPLETED' || data.is_execution_finished) {
            statusBox.innerHTML = "<span style='color: green;'>✅ ڈیٹا موصول ہو گیا! (خرچ: " + data.execution_cost_credits + " کریڈٹس)</span>";
            displayResults();
        } else if (data.state === 'QUERY_STATE_FAILED') {
            statusBox.innerHTML = "<span style='color: red;'>❌ کوئری میں غلطی آگئی ہے۔</span>";
        } else {
            setTimeout(startPolling, 4000); 
        }
    } catch (err) {
        statusBox.innerText = "رابطے میں خرابی یا غلط API Key!";
    }
}

async function displayResults() {
    const options = { headers: { 'X-DUNE-API-KEY': API_KEY } };
    try {
        const response = await fetch(`https://api.dune.com/api/v1/execution/${EXECUTION_ID}/results`, options);
        const data = await response.json();

        if (data.result && data.result.rows.length > 0) {
            const rows = data.result.rows;
            const columns = Object.keys(rows[0]);

            const headerRow = document.getElementById('table-header');
            columns.forEach(col => {
                let th = document.createElement('th');
                th.innerText = col.toUpperCase();
                headerRow.appendChild(th);
            });

            const tableBody = document.getElementById('table-body');
            rows.forEach(row => {
                let tr = document.createElement('tr');
                columns.forEach(col => {
                    let td = document.createElement('td');
                    td.innerText = row[col];
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            document.getElementById('results-table').style.display = 'table';
        }
    } catch (err) {
        console.error("ڈیٹا دکھانے میں دشواری:", err);
    }
}

startPolling();
</script>

</body>
</html>
