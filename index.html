<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDN Digital Hub & Calculator</title>
    <style>
        /* پرانا ڈیزائن یہاں موجود رہے گا */
        body { font-family: sans-serif; direction: rtl; text-align: center; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 8px; display: inline-block; width: 150px; }
        #result { margin-top: 20px; font-size: 20px; color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <h1>SDN ڈیجیٹل حب</h1>
    
    <div id="ideas-container">
        </div>

    <div id="result"></div>

    <script>
        // 1. وہی لاجک جو آپ نے بنائی تھی (تصویر والا کوڈ)
        // فرض کریں کہ یہاں amt، rate اور denominator پہلے سے ڈیفائن ہیں
        let amt = 100; // مثال کے طور پر
        let rate = 5;
        let denominator = 100;

        let fee = Math.floor((amt * rate) / denominator);

        // Rounding Up: اگر رقم ہو لیکن فیس 0 ہو تو اسے 1 کر دیں
        if (amt > 0 && fee === 0 && rate > 0) {
            fee = 1;
        }

        document.getElementById('result').innerHTML = `آپ کی فیس: <strong>${fee}</strong> ٹوکن`;

        // 2. فیس بک آئیڈیاز دکھانے والا کوڈ
        const links = [
            "https://www.facebook.com/share/1J3iiNusTZ/",
            "https://www.facebook.com/share/1Ar7UaBriG/",
            "https://www.facebook.com/share/1BKUuPbVH9/",
            "https://www.facebook.com/share/p/1bEcDkVFNk/"
        ];

        let container = document.getElementById('ideas-container');
        links.forEach((link, index) => {
            container.innerHTML += `<div class="card">آئیڈیا ${index + 1}<br><a href="${link}" target="_blank">دیکھیں</a></div>`;
        });
    </script>
</div>

</body>
</html>
