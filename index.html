<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDN News - لائیو ووٹنگ</title>
    <style>
        body {
            background-image: url('1000271859.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }
        .news-ticker {
            background: #cc0000;
            width: 100%;
            padding: 10px 0;
            position: fixed;
            top: 0;
            z-index: 1000;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 500px;
        }
        .poll-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-vote {
            background: white;
            color: #333;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: block;
            border: none;
            width: 100%;
            font-size: 16px;
        }
        .btn-vote:hover { background: #ffcc00; }
        .result {
            font-size: 14px;
            color: #ffcc00;
            margin-top: 5px;
            display: block;
        }
        #thank-you { display: none; color: #22c55e; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="news-ticker">
            <marquee direction="right">📢 SDN News: حلقہ NA-62 کے مسائل پر اپنی رائے دیں اور ووٹ ریکارڈ کروائیں ۔۔۔ </marquee>
        </div>

        <div class="container">
            <h1>عوامی رائے عامہ</h1>
            <div class="poll-card">
                <h3>آپ کے خیال میں سب سے اہم مسئلہ کیا ہے؟</h3>
                
                <button class="btn-vote" onclick="addVote('traffic')">🚗 جی ٹی روڈ فلائی اوور
                    <span class="result" id="traffic-res">0 ووٹ</span>
                </button>

                <button class="btn-vote" onclick="addVote('sewerage')">💧 سیوریج کا نظام
                    <span class="result" id="sewerage-res">0 ووٹ</span>
                </button>

                <button class="btn-vote" onclick="addVote('hospital')">🏥 ہسپتال کی بہتری
                    <span class="result" id="hospital-res">0 ووٹ</span>
                </button>

                <p id="thank-you">آپ کا ووٹ ریکارڈ کر لیا گیا ہے! ✅</p>
            </div>
        </div>
    </div>

    <script>
        // ووٹ دکھانے کا فنکشن
        function updateResults() {
            document.getElementById('traffic-res').innerText = (localStorage.getItem('traffic') || 0) + " ووٹ";
            document.getElementById('sewerage-res').innerText = (localStorage.getItem('sewerage') || 0) + " ووٹ";
            document.getElementById('hospital-res').innerText = (localStorage.getItem('hospital') || 0) + " ووٹ";
        }

        // ووٹ ڈالنے کا فنکشن
        function addVote(type) {
            let currentVotes = parseInt(localStorage.getItem(type) || 0);
            localStorage.setItem(type, currentVotes + 1);
            updateResults();
            document.getElementById('thank-you').style.display = 'block';
            
            // بٹن عارضی طور پر ڈس ایبل کرنا
            let buttons = document.getElementsByClassName('btn-vote');
            for(let btn of buttons) { btn.disabled = true; btn.style.opacity = "0.7"; }
        }

        // پیج لوڈ ہوتے ہی رزلٹ دکھائیں
        window.onload = updateResults;
    </script>
</body>
</html
